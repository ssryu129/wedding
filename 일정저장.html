<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>류성식 ♥ 현민희 결혼식</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #faf7f2;
    --warm: #f0e8db;
    --gold: #b89a6a;
    --dark: #2c2418;
    --muted: #8a7560;
  }

  body {
    background: var(--cream);
    color: var(--dark);
    font-family: 'Noto Serif KR', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    background: #fff;
    max-width: 360px;
    width: 100%;
    padding: 3rem 2.5rem;
    text-align: center;
    border: 1px solid #e8dfd2;
    position: relative;
    animation: fadeUp 0.8s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 40px; height: 40px;
    border-color: var(--gold);
    border-style: solid;
  }
  .card::before { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
  .card::after  { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

  .en-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--gold);
    margin-bottom: 1.2rem;
  }

  .names {
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.1em;
    line-height: 1.6;
    margin-bottom: 0.4rem;
  }

  .heart {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--gold);
    font-size: 18px;
    margin: 0 0.3rem;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--gold);
    margin: 1.4rem auto;
    opacity: 0.6;
  }

  .info {
    font-size: 13px;
    line-height: 2.2;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .info strong {
    color: var(--dark);
    font-weight: 400;
  }

  .btn-wrap {
    margin-top: 2rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 13px;
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    letter-spacing: 0.1em;
    cursor: pointer;
    border: none;
    transition: opacity 0.2s, transform 0.15s;
    text-decoration: none;
  }
  .btn:active { transform: scale(0.98); }

  .btn-primary {
    background: var(--dark);
    color: var(--cream);
  }
  .btn-secondary {
    background: transparent;
    color: var(--dark);
    border: 1px solid #d8cfc4;
  }

  .note {
    margin-top: 1.6rem;
    font-size: 11px;
    color: #b8a990;
    line-height: 1.8;
    letter-spacing: 0.03em;
  }

  #result {
    margin-top: 1.2rem;
    font-size: 12px;
    color: var(--gold);
    min-height: 18px;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="card">
  <p class="en-title">You are invited</p>
  <p class="names">류성식<span class="heart">♥</span>현민희</p>
  <p style="font-family:'Cormorant Garamond',serif; font-style:italic; font-size:13px; color:var(--gold); letter-spacing:0.15em;">Seongshick Ryu &amp; Minhee Hyun</p>

  <div class="divider"></div>

  <div class="info">
    <div><strong>2027년 1월 16일 토요일</strong></div>
    <div>오후 1시 30분</div>
    <div style="margin-top:0.6rem;"><strong>케이터틀</strong></div>
    <div>서울 마포구 백범로 23</div>
    <div style="margin-top:0.6rem; font-size:12px;">2호선 신촌역 6번 출구 도보 5분 · 주차 가능</div>
  </div>

  <div class="btn-wrap">
    <button class="btn btn-primary" onclick="addCalendar()">📅 캘린더에 저장하기</button>
    <a class="btn btn-secondary" href="https://map.naver.com/v5/search/케이터틀 마포구 백범로 23" target="_blank">📍 오시는 길</a>
  </div>

  <div id="result"></div>


</div>

<script>
function isIOS() {
  return /iP(hone|ad|od)/.test(navigator.userAgent);
}

function addCalendar() {
  const result = document.getElementById('result');

  if (isIOS()) {
    const ics = [
      'BEGIN:VCALENDAR', 'VERSION:2.0',
      'BEGIN:VEVENT',
      'DTSTART;TZID=Asia/Seoul:20270116T133000',
      'DTEND;TZID=Asia/Seoul:20270116T153000',
      'SUMMARY:류성식 ♥ 현민희 결혼식',
      'LOCATION:케이터틀 (서울 마포구 백범로 23)',
      'DESCRIPTION:2호선 신촌역 6번 출구 도보 5분\\, 주차 가능',
      'END:VEVENT', 'END:VCALENDAR'
    ].join('\r\n');

    const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'wedding.ics'; a.click();
    URL.revokeObjectURL(url);
    result.textContent = '캘린더 파일을 열어 저장하세요.';
  } else {
    const params = new URLSearchParams({
      action: 'TEMPLATE',
      text: '류성식 ♥ 현민희 결혼식',
      dates: '20270116T043000Z/20270116T063000Z',
      location: '케이터틀 (서울 마포구 백범로 23)',
      details: '2호선 신촌역 6번 출구 도보 5분, 주차 가능'
    });
    window.open('https://calendar.google.com/calendar/render?' + params, '_blank');
    result.textContent = 'Google 캘린더가 열립니다.';
  }
}
</script>
</body>
</html>
